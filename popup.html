<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YT Shorts Frame Skipper</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --accent: #ff4444;
      --accent2: #ff8c42;
      --text: #f0f0f0;
      --muted: #666;
      --mono: 'Space Mono', monospace;
    }

    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--mono);
      overflow: hidden;
    }

    .header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg { width: 16px; height: 16px; fill: #fff; }

    .title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text);
      line-height: 1.3;
    }

    .subtitle {
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 0.04em;
      margin-top: 1px;
    }

    .content { padding: 14px 18px 16px; }

    .section-label {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .keybind-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }

    .keybind-row:last-child { border-bottom: none; }

    .keybind-info { display: flex; align-items: center; gap: 10px; }

    .key {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: 3px solid var(--border);
      border-radius: 5px;
      padding: 3px 9px;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
      min-width: 28px;
      text-align: center;
    }

    .key.accent { border-color: var(--accent); border-bottom-color: #991111; color: var(--accent); }
    .key.accent2 { border-color: var(--accent2); border-bottom-color: #994d10; color: var(--accent2); }

    .action {
      font-size: 11px;
      color: #bbb;
    }

    .badge {
      font-size: 9px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    .badge-back { background: rgba(255,68,68,0.15); color: var(--accent); }
    .badge-fwd  { background: rgba(255,140,66,0.15); color: var(--accent2); }

    .divider { height: 1px; background: var(--border); margin: 12px 0; }

    .note {
      font-size: 9px;
      color: var(--muted);
      line-height: 1.6;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 2px solid var(--accent);
      border-radius: 4px;
      padding: 7px 10px;
    }

    .status-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 10px;
    }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #333;
      flex-shrink: 0;
    }

    .dot.active { background: #44ff88; box-shadow: 0 0 5px #44ff88aa; animation: pulse 2s ease infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .status-text { font-size: 9px; color: var(--muted); }

    .fps-tag {
      margin-left: auto;
      font-size: 9px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <div>
      <div class="title">Shorts Frame Skipper</div>
      <div class="subtitle">Frame-by-frame for YouTube Shorts</div>
    </div>
  </div>

  <div class="content">
    <div class="section-label">Keyboard Shortcuts</div>

    <div class="keybind-row">
      <div class="keybind-info">
        <span class="key accent">,</span>
        <span class="action">Back 1 frame</span>
      </div>
      <span class="badge badge-back">← prev</span>
    </div>

    <div class="keybind-row">
      <div class="keybind-info">
        <span class="key accent2">.</span>
        <span class="action">Forward 1 frame</span>
      </div>
      <span class="badge badge-fwd">next →</span>
    </div>

    <div class="divider"></div>

    <div class="note">
      Pause the Short first — then use <strong style="color:#ccc">,</strong> and <strong style="color:#ccc">.</strong> to step through frames. Works on Shorts pages and when the miniplayer is open.
    </div>

    <div class="status-row">
      <div class="dot active" id="statusDot"></div>
      <span class="status-text" id="statusText">Watching for Shorts…</span>
      <span class="fps-tag">30 fps</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
